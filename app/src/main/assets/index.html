<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner - Keep 跑步数据同步</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header { text-align: center; color: white; padding: 30px 0; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .card h2 { font-size: 18px; color: #333; margin-bottom: 16px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        .message.error { background: #ffebee; color: #c62828; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .stat-item { text-align: center; padding: 12px; background: #f8f9fa; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
        .alert {
            background: #fff3e0;
            color: #e65100;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #ff9800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃 Runner</h1>
            <p>Keep 跑步数据同步助手</p>
        </div>

        <div class="card">
            <div class="alert">⚠️ 本应用需要 Root 权限才能读取 Keep 数据</div>
            <h2>使用说明</h2>
            <p style="font-size:14px;color:#666;line-height:1.6;">
                1. 确保手机已 Root（Magisk/超级用户）<br>
                2. 确保已安装 Keep APP 并有跑步记录<br>
                3. 点击下方"同步 Keep 数据"按钮<br>
                4. 在弹出的 Root 授权窗口中点击"允许"
            </p>
        </div>

        <div class="card">
            <h2>操作</h2>
            <button class="btn btn-primary" id="syncBtn" onclick="syncKeepData()">同步 Keep 数据</button>
            <button class="btn btn-secondary" onclick="refreshData()" style="margin-top:12px;">刷新数据</button>
            <div id="message" class="message"></div>
        </div>

        <div class="card">
            <h2>跑步统计</h2>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalRuns">0</div>
                    <div class="stat-label">总跑次</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalDistance">0</div>
                    <div class="stat-label">总距离 (km)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalCalories">0</div>
                    <div class="stat-label">总消耗 (kcal)</div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // 同步 Keep 数据 - 全局函数
        window.syncKeepData = function() {
            console.log('syncKeepData called at ' + new Date().toISOString());
            var btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.textContent = '同步中...';

            if (window.AndroidApp) {
                console.log('Calling AndroidApp.syncKeepData()');
                try {
                    window.AndroidApp.syncKeepData();
                    console.log('AndroidApp.syncKeepData() completed');
                } catch (e) {
                    console.error('AndroidApp.syncKeepData() error:', e);
                    showMessage('调用失败：' + e.message, true);
                    btn.disabled = false;
                    btn.textContent = '同步 Keep 数据';
                    return;
                }
                setTimeout(function() {
                    refreshData();
                    btn.disabled = false;
                    btn.textContent = '同步 Keep 数据';
                }, 3000);
            } else {
                console.error('AndroidApp not available');
                showMessage('原生接口不可用，请在 Android 环境中运行', true);
                btn.disabled = false;
                btn.textContent = '同步 Keep 数据';
            }
        };

        // 刷新数据
        window.refreshData = function() {
            console.log('refreshData called');
            if (window.AndroidApp) {
                try {
                    var stats = JSON.parse(window.AndroidApp.getStats());
                    document.getElementById('totalRuns').textContent = stats.totalRuns;
                    document.getElementById('totalDistance').textContent = stats.totalDistance;
                    document.getElementById('totalCalories').textContent = stats.totalCalories;

                    var runData = JSON.parse(window.AndroidApp.getRunData());
                    console.log('Run data:', runData);
                } catch (e) {
                    console.log('Error:', e);
                }
            }
        };

        function showMessage(text, isError) {
            var msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message' + (isError ? ' error' : '');
            msgEl.style.display = 'block';
            setTimeout(function() {
                msgEl.style.display = 'none';
            }, 5000);
        }

        console.log('Runner App initialized');
        console.log('AndroidApp available:', !!window.AndroidApp);
    </script>
</body>
</html>
